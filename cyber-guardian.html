<!DOCTYPE html>
<html lang="zh" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script>window.elementSdk={init:(o)=>{},setConfig:(c)=>{}};</script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&amp;display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box} html,body{height:100%;margin:0;font-family:'Noto Sans SC',sans-serif;overflow:hidden}
    .game-container{position:relative;width:100%;height:100%;background:linear-gradient(135deg,#0a0e27,#1a1f3a);overflow:hidden;display:flex;flex-direction:column}
    .canvas-wrapper{flex:1;display:flex;align-items:center;justify-content:center;position:relative;width:100%;overflow:hidden}
    canvas{display:block;max-width:100%;max-height:100%;width:auto;height:auto;background:radial-gradient(circle at center,rgba(99,102,241,0.1),rgba(15,23,42,0.8));box-shadow:inset 0 0 40px rgba(99,102,241,0.2),0 0 40px rgba(99,102,241,0.1);border-radius:8px;touch-action:none}
    .menu-screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a0e27,#1a1f3a);z-index:50;backdrop-filter:blur(8px)}
    .menu-screen.hidden{display:none}
    .menu-content{text-align:center;animation:slideUp 0.6s ease-out}
    @keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
    .menu-title{font-size:clamp(2.5rem,8vw,4rem);font-weight:900;background:linear-gradient(135deg,#a5f3fc,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:1rem;letter-spacing:-1px}
    .menu-subtitle{font-size:clamp(1rem,4vw,1.25rem);color:#94a3b8;margin-bottom:2rem;line-height:1.6}
    .menu-button{padding:clamp(0.75rem,2vw,1rem) clamp(1.5rem,4vw,2.5rem);font-size:clamp(1rem,3vw,1.25rem);border:none;border-radius:12px;font-weight:700;cursor:pointer;transition:all .3s ease;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;box-shadow:0 8px 24px rgba(99,102,241,0.4);animation:pulse 2s ease-in-out infinite}
    .menu-button:hover{transform:scale(1.05);box-shadow:0 12px 32px rgba(99,102,241,0.6)}
    .menu-button:active{transform:scale(0.95)}
    @keyframes pulse{0%,100%{box-shadow:0 8px 24px rgba(99,102,241,0.4)}50%{box-shadow:0 12px 32px rgba(99,102,241,0.6)}}
    .game-ui{display:flex;justify-content:space-between;align-items:center;padding:clamp(0.5rem,2vw,1rem);background:rgba(15,23,42,0.6);backdrop-filter:blur(8px);border-top:1px solid rgba(99,102,241,0.2);gap:1rem;font-size:clamp(0.875rem,2.5vw,1.125rem)}
    .ui-item{display:flex;align-items:center;gap:0.5rem;color:#a5b4fc;font-weight:600}
    .ui-label{color:#94a3b8;font-weight:400}
    .score-display{color:#34d399;font-size:1.2em}
    .health-display{color:#fca5a5}
    .wave-display{color:#fbbf24}
    .game-over-screen{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);z-index:100;display:none}
    .game-over-screen.active{display:flex}
    .game-over-content{text-align:center;padding:clamp(1.5rem,5vw,2.5rem);background:linear-gradient(135deg,rgba(99,102,241,0.15),rgba(168,85,247,0.1));border:1px solid rgba(99,102,241,0.3);border-radius:16px;animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1)}
    @keyframes popIn{0%{opacity:0;transform:scale(0.8)}100%{opacity:1;transform:scale(1)}}
    .game-over-emoji{font-size:clamp(3rem,10vw,5rem);margin-bottom:1rem;animation:bounce 0.6s ease-out}
    @keyframes bounce{0%{transform:scale(0) rotate(-45deg)}50%{transform:scale(1.1)}100%{transform:scale(1) rotate(0deg)}}
    .game-over-title{font-size:clamp(1.5rem,5vw,2.5rem);font-weight:900;color:#e0e7ff;margin-bottom:0.5rem}
    .game-over-score{font-size:clamp(1.25rem,4vw,2rem);color:#fbbf24;font-weight:700;margin:1rem 0}
    .game-over-buttons{display:flex;gap:1rem;margin-top:1.5rem;flex-wrap:wrap;justify-content:center}
    .game-over-btn{padding:clamp(0.5rem,2vw,0.75rem) clamp(1rem,3vw,1.5rem);border:none;border-radius:8px;font-weight:600;cursor:pointer;transition:all .3s ease;font-size:clamp(0.875rem,2vw,1rem)}
    .btn-retry{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
    .btn-retry:hover{transform:translateY(-2px);box-shadow:0 8px 16px rgba(99,102,241,0.4)}
    .btn-menu{background:rgba(255,255,255,0.1);color:#a5b4fc;border:1px solid rgba(255,255,255,0.2)}
    .btn-menu:hover{background:rgba(255,255,255,0.15)}
    .mobile-hint{position:absolute;bottom:clamp(0.5rem,2vw,1rem);left:50%;transform:translateX(-50%);font-size:clamp(0.75rem,2vw,0.875rem);color:#94a3b8;background:rgba(15,23,42,0.7);padding:clamp(0.5rem,1.5vw,0.75rem) clamp(1rem,3vw,1.5rem);border-radius:20px;border:1px solid rgba(99,102,241,0.2);pointer-events:none;animation:fadeInUp 0.6s ease-out 2s both}
    @keyframes fadeInUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    .speed-up-hint{position:absolute;top:20%;left:50%;transform:translate(-50%,-50%);color:#fbbf24;font-size:clamp(1.2rem,4vw,2rem);font-weight:900;text-shadow:0 0 20px rgba(251,191,36,0.8);opacity:0;pointer-events:none;z-index:40;animation:speedUpFlash 1.5s ease-out}
    @keyframes speedUpFlash{0%{opacity:0;transform:translate(-50%,-20px)}20%{opacity:1;transform:translate(-50%,0)}80%{opacity:1;transform:translate(-50%,0)}100%{opacity:0;transform:translate(-50%,20px)}}
    .powerup-timer{position:absolute;top:10px;right:10px;color:#fbbf24;font-size:14px;background:rgba(15,23,42,0.8);padding:5px 12px;border-radius:20px;border:1px solid #fbbf24;pointer-events:none}
    @media(max-width:768px){.game-ui{gap:0.5rem}canvas{border-radius:4px}}
  </style>
</head>
<body class="h-full bg-slate-950">
<div id="app" class="game-container">
  <div id="menuScreen" class="menu-screen">
    <div class="menu-content">
      <div style="font-size: clamp(3rem, 10vw, 5rem); margin-bottom: 1rem;">
        <img src="https://s1.aigei.com/src/img/png/58/58358bb3e0e84bcea2dbdec731e6f675.png?watermark/3/image/aHR0cHM6Ly9zMS5haWdlaS5jb20vd2F0ZXJtYXJrL21pZGRsZS5wbmc_ZT0yMDUxMDIwODAwJnRva2VuPVA3UzJYcHpmejExdkFrQVNMVGtmSE43Rnctb09aQmVjcWVKYXh5cEw6aUtTNHV4LUU0bjBsdU1fdmlIZnlUQUhVLUE0PQ==/dissolve/100/gravity/Center/dx/15/dy/1&e=2051020800&token=P7S2Xpzfz11vAkASLTkfHN7Fw-oOZBecqeJaxypL:9QV8OkJHR-QwptvP4Olp-iMq7i4=" alt="卫士" style="width:80px;height:80px;object-fit:contain;">
      </div>
      <h1 class="menu-title">网络卫士</h1>
      <p class="menu-subtitle">拦截霸凌言论，守护网络世界！</p>
      <p class="menu-subtitle" style="font-size: clamp(0.875rem, 3vw, 1rem); color: #64748b; margin-top: 1.5rem;">💻 鼠标移动 / 📱 手指滑动 · 点击射击</p>
      <button class="menu-button mt-6" onclick="startGame()">开始防御</button>
      <button id="muteToggle" class="menu-button mt-3" style="background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); font-size:0.9rem;" onclick="toggleMute()">🔊 音效：开</button>
    </div>
  </div>
  <div class="canvas-wrapper">
    <canvas id="gameCanvas"></canvas>
    <div class="mobile-hint">👆 滑动控制 · 点击屏幕射击</div>
    <div id="speedUpHint" class="speed-up-hint"></div>
    <div id="powerupTimer" class="powerup-timer" style="display:none;"></div>
  </div>
  <div class="game-ui" id="gameUI" style="display:none;">
    <div class="ui-item"><span class="ui-label">⏱️ 时间</span> <span id="waveCounter" class="wave-display">5:00</span></div>
    <div class="ui-item"><span class="ui-label">❤️ 生命</span> <span id="healthCounter" class="health-display">3</span></div>
    <div class="ui-item"><span class="ui-label">⭐ 分数</span> <span id="scoreDisplay" class="score-display">0</span></div>
    <div class="ui-item"><span class="ui-label">⚡ 速度</span> <span id="speedDisplay" style="color:#fbbf24;">1.0x</span></div>
  </div>
  <div id="gameOverScreen" class="game-over-screen">
    <div class="game-over-content">
      <div id="gameOverEmoji" class="game-over-emoji">🌟</div>
      <div id="gameOverTitle" class="game-over-title">任务完成！</div>
      <div id="gameOverScore" class="game-over-score">得分: 0</div>
      <p style="color:#94a3b8;font-size:clamp(0.875rem,2.5vw,1rem);margin:1rem 0;"><span id="gameOverStats"></span></p>
      <div class="game-over-buttons">
        <button class="game-over-btn btn-retry" onclick="restartGame()">🔄 再来一局</button>
        <button class="game-over-btn btn-menu" onclick="goToMenu()">🏠 返回菜单</button>
      </div>
    </div>
  </div>
</div>
<script>
  (function(){
    const gameCanvas = document.getElementById('gameCanvas');
    const ctx = gameCanvas.getContext('2d');

    const badWords = ['废物','垃圾','丑八怪','肥猪','矮冬瓜','四眼狗','书呆子','穷鬼','脑残','智障','傻逼','白痴','神经病','变态','娘炮','男人婆','绿茶','渣男','小三','狐狸精','没人要','单身狗','loser','失败者','滚出去','去死吧','恶心','想吐','别活了','社会垃圾','寄生虫','吸血鬼','啃老族','躺平废物','键盘侠','杠精','喷子','柠檬精','学渣','垫底','倒数第一','没人缘','被孤立','小丑','笑话','装什么','你配吗','不自量力','癞蛤蟆','做梦吧','下辈子吧','恶心死了','看到你就烦','离我远点','别碰我','晦气','扫把星'];

    // ========== 音效系统 ==========
    let soundEnabled = true;
    const soundBuffers = {};
    const lastPlayTime = { destroy:0, normalShoot:0, laserShoot:0, rapidShoot:0 };
    const MIN_SOUND_INTERVAL = 130;

    function loadSound(name, url) {
      const audio = new Audio(url);
      audio.preload = 'auto';
      audio.volume = 0.55;
      soundBuffers[name] = audio;
    }

    // 解锁音频：必须先由用户手势触发一次播放
    function unlockAudio() {
      const silent = new Audio("data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4Ljc2LjEwMAAAAAAAAAAAAAAA//tQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAWGluZwAAAA8AAAACAAABIADAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDV1dXV1dXV1dXV1dXV1dXV1dXV1dXV1dXV6urq6urq6urq6urq6urq6urq6urq6urq6v////////////////////////////////8AAAAATGF2YzU4LjEzAAAAAAAAAAAAAAAAJAAAAAAAAAAAASDUxMDRYAAAAAAAAAAAAAAAAAAAA//sQZAAP8AAAaQAAAAgAAA0gAAABAAABpAAAACAAADSAAAAETEFNRTMuMTAwVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV//tQ==");
      silent.play().then(() => {
        // 解锁成功后立即暂停
        silent.pause();
        silent.currentTime = 0;
      }).catch(()=>{});
    }

    function playSound(name) {
      if (!soundEnabled) return;
      const now = Date.now();
      if (now - lastPlayTime[name] < MIN_SOUND_INTERVAL) return;
      const audio = soundBuffers[name];
      if (!audio) return;
      try {
        audio.pause();
        audio.currentTime = 0;
        audio.play().catch(()=>{});
        lastPlayTime[name] = now;
      } catch(e) {}
    }

    loadSound('destroy', 'https://jackmum2025.github.io/forMiao/destroy.mp3');
    loadSound('normalShoot', 'https://jackmum2025.github.io/forMiao/Normalshoot.mp3');
    loadSound('laserShoot', 'https://jackmum2025.github.io/forMiao/Skillshoot.mp3');
    loadSound('rapidShoot', 'https://jackmum2025.github.io/forMiao/machinegun.mp3');

    function toggleMute() {
      soundEnabled = !soundEnabled;
      const btn = document.getElementById('muteToggle');
      btn.textContent = soundEnabled ? '🔊 音效：开' : '🔇 音效：关';
    }
    window.toggleMute = toggleMute;

    // 玩家图片
    const playerImage = new Image();
    playerImage.crossOrigin = 'anonymous';
    playerImage.src = 'https://s1.aigei.com/src/img/png/58/58358bb3e0e84bcea2dbdec731e6f675.png?watermark/3/image/aHR0cHM6Ly9zMS5haWdlaS5jb20vd2F0ZXJtYXJrL21pZGRsZS5wbmc_ZT0yMDUxMDIwODAwJnRva2VuPVA3UzJYcHpmejExdkFrQVNMVGtmSE43Rnctb09aQmVjcWVKYXh5cEw6aUtTNHV4LUU0bjBsdU1fdmlIZnlUQUhVLUE0PQ==/dissolve/100/gravity/Center/dx/15/dy/1&e=2051020800&token=P7S2Xpzfz11vAkASLTkfHN7Fw-oOZBecqeJaxypL:9QV8OkJHR-QwptvP4Olp-iMq7i4=';

    const state = {
      running: false, width: 0, height: 0,
      player: { x:0, y:0, w:0, h:0 },
      bullets: [], enemies: [], powerUps: [],
      score: 0, lives: 3, gameTimer: 0,
      difficulty: 1, bulletSpeed: 0, enemySpeed: 0, baseEnemySpeed: 0,
      speedMultiplier: 1.0, spawnRate: 0,
      shootCooldown: 0, shootCooldownMax: 10,
      laserMode: false, laserTimer: 0, laserMaxTime: 600,
      rapidMode: false, rapidTimer: 0, rapidMaxTime: 600,
      autoShootTimer: 0, autoShootInterval: 5,
      gameEndTime: 300, powerUpSpawnChance: 25,
      lastSpeedUpTime: 0
    };
    let particles = [];
    const MAX_PARTICLES = 60;

    function initCanvas() {
      const wrapper = document.querySelector('.canvas-wrapper');
      state.width = wrapper.clientWidth;
      state.height = wrapper.clientHeight;
      gameCanvas.width = state.width;
      gameCanvas.height = state.height;
      state.player.w = state.width * 0.08;
      state.player.h = state.width * 0.08;
      state.player.y = state.height - state.player.h - 20;
      state.player.x = state.width/2 - state.player.w/2;
      updateDifficulty();
      setupControls();
    }

    function updateDifficulty() {
      const progress = Math.min(state.gameTimer / (state.gameEndTime * 60), 1.0);
      const secElapsed = Math.floor(state.gameTimer / 60);
      const speedLevel = Math.floor(secElapsed / 20);
      state.speedMultiplier = 1.0 + speedLevel * 0.2;
      if (speedLevel>0 && secElapsed%20===0 && secElapsed!==state.lastSpeedUpTime) {
        showSpeedUpHint(state.speedMultiplier);
        state.lastSpeedUpTime = secElapsed;
      }
      state.difficulty = 1 + progress * 2;
      state.bulletSpeed = state.height * 0.012;
      state.baseEnemySpeed = state.height * 0.0028;
      state.enemySpeed = state.baseEnemySpeed * state.speedMultiplier * state.difficulty;
      state.spawnRate = Math.max(50, 130 - Math.floor(progress * 80));
    }

    function showSpeedUpHint(m) {
      const h = document.getElementById('speedUpHint');
      h.textContent = `⚡ 速度提升至 ${m.toFixed(1)}x ⚡`;
      h.style.animation = 'none';
      setTimeout(() => h.style.animation = 'speedUpFlash 1.5s ease-out', 10);
    }

    function setupControls() {
      document.addEventListener('mousemove', e => {
        if(!state.running) return;
        const r = gameCanvas.getBoundingClientRect();
        state.player.x = Math.max(0, Math.min(state.width - state.player.w, e.clientX - r.left - state.player.w/2));
      });
      gameCanvas.addEventListener('touchmove', e => {
        e.preventDefault();
        if(!state.running) return;
        const t = e.touches[0], r = gameCanvas.getBoundingClientRect();
        state.player.x = Math.max(0, Math.min(state.width - state.player.w, t.clientX - r.left - state.player.w/2));
      }, {passive: false});
      gameCanvas.addEventListener('touchstart', e => {
        e.preventDefault();
        if(!state.running) return;
        const t = e.touches[0], r = gameCanvas.getBoundingClientRect();
        state.player.x = Math.max(0, Math.min(state.width - state.player.w, t.clientX - r.left - state.player.w/2));
        tryShoot();
      }, {passive: false});
      gameCanvas.addEventListener('mousedown', e => {
        e.preventDefault();
        if(!state.running) return;
        tryShoot();
      });
      gameCanvas.addEventListener('contextmenu', e => e.preventDefault());
    }

    function tryShoot() {
      if (state.rapidMode) return;
      if (state.shootCooldown > 0) return;
      shootBullet();
      state.shootCooldown = state.shootCooldownMax;
    }

    function shootBullet() {
      if (state.laserMode) {
        playSound('laserShoot');
        const cnt = 8, sp = (state.player.w * 1.2) / (cnt - 1);
        const sx = state.player.x - state.player.w * 0.1;
        for (let i=0; i<cnt; i++)
          state.bullets.push({x: sx + i*sp, y: state.player.y-5, w:5, h:22, vx:0, isLaser:true});
        return;
      }
      playSound('normalShoot');
      const offs = [-16, 0, 16];
      for (let o of offs)
        state.bullets.push({x: state.player.x + state.player.w/2 - 3 + o, y: state.player.y, w:6, h:16, vx:0});
    }

    function shootRapidBullet() {
      playSound('rapidShoot');
      state.bullets.push({x: state.player.x + state.player.w/2 - 3, y: state.player.y, w:8, h:18, vx:0, isRapid:true});
    }

    function activatePowerUp(type) {
      if (type === 'health') { state.lives = Math.min(state.lives+1,10); return; }
      if (type === 'laser') { state.laserMode=true; state.rapidMode=false; state.laserTimer=0; }
      else if (type === 'rapid') { state.rapidMode=true; state.laserMode=false; state.rapidTimer=0; }
    }

    function spawnEnemy() {
      const cnt = Math.min(4, 1 + Math.floor(state.difficulty * 1.1));
      for (let i=0; i<cnt; i++)
        state.enemies.push({x: Math.random()*(state.width-50), y:-60-i*60, w:50, h:50, text:badWords[Math.floor(Math.random()*badWords.length)], health:1});
    }

    function spawnPowerUp() {
      const types = ['health','laser','rapid'], icons={health:'❤️',laser:'⚡',rapid:'🔥'};
      const t = types[Math.floor(Math.random()*types.length)];
      state.powerUps.push({x: Math.random()*(state.width-40), y:-50, w:40, h:40, type:t, icon:icons[t]});
    }

    function collide(a,b) { return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y; }

    function addParticle(x,y,vx,vy,life,color,size) {
      particles.push({x,y,vx,vy,life,color,size});
      if (particles.length > MAX_PARTICLES) particles.shift();
    }

    function createExplosion(x,y) {
      playSound('destroy');
      for (let i=0; i<4; i++) {
        const a = Math.PI*2*i/4, v = 2+Math.random()*2;
        addParticle(x,y, Math.cos(a)*v, Math.sin(a)*v, 18, ['#34d399','#fbbf24'][i%2], 2.5);
      }
    }
    function createMissEffect(x,y) {
      for (let i=0; i<3; i++) {
        const a = Math.PI*2*i/3;
        addParticle(x,y, Math.cos(a)*1.5, Math.sin(a)*1.5, 15, '#fca5a5', 2);
      }
    }
    function createPowerUpEffect(x,y,type) {
      const cols = {health:'#34d399',laser:'#fbbf24',rapid:'#f97316'};
      for (let i=0; i<6; i++) {
        const a = Math.PI*2*i/6;
        addParticle(x,y, Math.cos(a)*2, Math.sin(a)*2, 20, cols[type], 2.5);
      }
    }

    function update() {
      if (!state.running) return;
      if (state.shootCooldown > 0) state.shootCooldown--;
      updateDifficulty();

      if (state.laserMode) { state.laserTimer++; if(state.laserTimer>state.laserMaxTime) state.laserMode=false; }
      if (state.rapidMode) { state.rapidTimer++; if(state.rapidTimer>state.rapidMaxTime) state.rapidMode=false; }

      if (state.rapidMode) {
        state.autoShootTimer++;
        if (state.autoShootTimer >= state.autoShootInterval) {
          shootRapidBullet();
          state.autoShootTimer = 0;
        }
      }

      state.bullets = state.bullets.filter(b => {
        b.y -= state.bulletSpeed * (b.isRapid ? 1.3 : 1);
        return b.y > -60;
      });
      state.enemies.forEach(e => e.y += state.enemySpeed);
      state.powerUps = state.powerUps.filter(p => {
        p.y += state.enemySpeed * 0.6;
        return p.y < state.height;
      });

      for (let bi = state.bullets.length-1; bi >= 0; bi--) {
        const b = state.bullets[bi];
        for (let ei = state.enemies.length-1; ei >= 0; ei--) {
          const e = state.enemies[ei];
          if (collide(b, e)) {
            state.score += 10;
            createExplosion(e.x+e.w/2, e.y+e.h/2);
            state.enemies.splice(ei,1);
            state.bullets.splice(bi,1);
            break;
          }
        }
      }

      state.powerUps = state.powerUps.filter(p => {
        if (collide(state.player, p)) {
          activatePowerUp(p.type);
          createPowerUpEffect(p.x+p.w/2, p.y+p.h/2, p.type);
          return false;
        }
        return true;
      });

      state.enemies = state.enemies.filter(e => {
        if (e.y > state.height) {
          state.lives--;
          createMissEffect(e.x+e.w/2, e.y);
          return false;
        }
        return true;
      });

      state.gameTimer++;
      if (state.gameTimer % Math.max(25, state.spawnRate) === 0) spawnEnemy();
      if (state.gameTimer % 60 === 0 && Math.random()*100 < state.powerUpSpawnChance) spawnPowerUp();
      if (state.lives <= 0 || state.gameTimer > state.gameEndTime * 60) endGame();
      updateUI();
    }

    function draw() {
      ctx.fillStyle = '#0a0e27';
      ctx.fillRect(0,0,state.width,state.height);

      const px = state.player.x + state.player.w/2;
      const py = state.player.y + state.player.h/2;
      const pr = state.player.w/2;
      if (playerImage.complete && playerImage.naturalWidth>0) {
        ctx.save();
        ctx.beginPath(); ctx.arc(px, py, pr, 0, Math.PI*2); ctx.clip();
        ctx.drawImage(playerImage, state.player.x, state.player.y, state.player.w, state.player.h);
        ctx.restore();
        ctx.beginPath(); ctx.arc(px, py, pr+2, 0, Math.PI*2);
        ctx.strokeStyle = '#a5f3fc'; ctx.lineWidth = 2; ctx.stroke();
      } else {
        ctx.fillStyle = '#6366f1';
        ctx.beginPath(); ctx.arc(px, py, pr, 0, Math.PI*2); ctx.fill();
      }

      state.bullets.forEach(b => {
        if (b.isLaser) {
          ctx.fillStyle = '#fbbf24';
          ctx.fillRect(b.x-2, b.y, 4, b.h+4);
        } else if (b.isRapid) {
          ctx.fillStyle = '#f97316';
          ctx.fillRect(b.x-2, b.y, 8, b.h);
        } else {
          ctx.fillStyle = '#34d399';
          ctx.fillRect(b.x, b.y, b.w, b.h);
        }
      });

      state.enemies.forEach(e => {
        ctx.fillStyle = 'rgba(248,113,113,0.85)';
        ctx.beginPath(); ctx.arc(e.x+e.w/2, e.y+e.h/2, e.w/2, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#f87171'; ctx.lineWidth = 2; ctx.stroke();
        ctx.font = 'bold 13px "Noto Sans SC"'; ctx.fillStyle = 'white';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(e.text, e.x+e.w/2, e.y+e.h/2);
      });

      state.powerUps.forEach(p => {
        const cols = {health:'#34d399',laser:'#fbbf24',rapid:'#f97316'};
        ctx.fillStyle = cols[p.type];
        ctx.beginPath(); ctx.arc(p.x+p.w/2, p.y+p.h/2, p.w/2, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 2; ctx.stroke();
        ctx.font = 'bold 14px Arial'; ctx.fillStyle = 'white';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(p.icon, p.x+p.w/2, p.y+p.h/2);
      });

      particles.forEach(p => {
        ctx.globalAlpha = p.life / 20;
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
      });
      ctx.globalAlpha = 1;
    }

    function updateParticles() {
      particles = particles.filter(p => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.06;
        p.life--;
        return p.life > 0;
      });
    }

    function updateUI() {
      document.getElementById('scoreDisplay').textContent = Math.floor(state.score);
      document.getElementById('healthCounter').textContent = state.lives;
      const timeLeft = Math.max(0, state.gameEndTime - Math.floor(state.gameTimer/60));
      const m = Math.floor(timeLeft/60), s = timeLeft%60;
      let status = `${m}:${s.toString().padStart(2,'0')}`;
      const td = document.getElementById('powerupTimer');
      if (state.laserMode) {
        const lt = Math.ceil((state.laserMaxTime - state.laserTimer)/60);
        status += ' ⚡'; td.textContent = `⚡ 激光 ${lt}秒`; td.style.display='block';
      } else if (state.rapidMode) {
        const rt = Math.ceil((state.rapidMaxTime - state.rapidTimer)/60);
        status += ' 🔥'; td.textContent = `🔥 连击 ${rt}秒`; td.style.display='block';
      } else { td.style.display='none'; }
      document.getElementById('waveCounter').textContent = status;
      document.getElementById('speedDisplay').textContent = state.speedMultiplier.toFixed(1)+'x';
    }

    function gameLoop() {
      update();
      updateParticles();
      draw();
      requestAnimationFrame(gameLoop);
    }

    function startGame() {
      // 解锁音频：只有用户主动点击才会执行
      unlockAudio();
      document.getElementById('menuScreen').classList.add('hidden');
      document.getElementById('gameUI').style.display = 'flex';
      document.getElementById('gameOverScreen').classList.remove('active');
      state.running = true; state.score = 0; state.lives = 3;
      state.gameTimer = 0; state.bullets = []; state.enemies = []; state.powerUps = [];
      state.shootCooldown = 0; state.laserMode = false; state.rapidMode = false;
      state.autoShootTimer = 0; state.speedMultiplier = 1.0; state.lastSpeedUpTime = 0;
      state.player.x = state.width/2 - state.player.w/2;
      particles = []; updateDifficulty(); updateUI();
    }

    function endGame() {
      state.running = false;
      document.getElementById('gameUI').style.display = 'none';
      document.getElementById('gameOverScreen').classList.add('active');
      document.getElementById('powerupTimer').style.display = 'none';
      const fs = Math.floor(state.score);
      document.getElementById('gameOverEmoji').textContent = fs>500?'🏆':fs>300?'🌟':fs>100?'💪':'👊';
      document.getElementById('gameOverScore').textContent = `得分: ${fs}`;
      document.getElementById('gameOverTitle').textContent = fs>500?'超级卫士！':fs>300?'很不错！':fs>100?'继续加油！':'再接再厉！';
      document.getElementById('gameOverStats').textContent = `🎯 拦截${Math.floor(fs/10)}次 | ⏱️ 坚持${Math.floor(state.gameTimer/60)}秒`;
    }

    function restartGame() { initCanvas(); startGame(); }
    function goToMenu() {
      state.running = false;
      document.getElementById('menuScreen').classList.remove('hidden');
      document.getElementById('gameUI').style.display = 'none';
      document.getElementById('gameOverScreen').classList.remove('active');
      document.getElementById('powerupTimer').style.display = 'none';
    }

    window.startGame = startGame;
    window.restartGame = restartGame;
    window.goToMenu = goToMenu;

    window.addEventListener('resize', () => { if(!state.running) initCanvas(); });
    window.addEventListener('load', () => { initCanvas(); gameLoop(); });
    if (document.readyState === 'complete') { initCanvas(); gameLoop(); }
  })();
</script>
</body>
</html>
