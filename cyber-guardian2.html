<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover" />
<title>🛡️ 善意小英雄 · 拒绝网络霸凌</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1a2e;
        font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
        touch-action: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
    }
    
    canvas {
        display: block;
        width: 100%;
        height: 100%;
        cursor: pointer;
        image-rendering: auto;
    }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<script>
(function(){
    "use strict";
    
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    
    // ==================== 词库 ====================
    const POSITIVE_WORDS = [
        "🌟 你很好", "💪 别在意", "❤️ 我支持你", "🤗 不是你的错", "✨ 你很特别",
        "🌈 做自己", "🎉 你超棒", "🌸 温柔回应", "🕊️ 和平相处", "⭐ 相信自己",
        "🌻 保持微笑", "🦋 屏蔽恶言", "🎈 寻求帮助", "💎 你很珍贵", "🔥 勇敢说不",
        "🌺 善良最酷", "☀️ 明天更好", "🌙 关闭屏幕", "⚡ 告诉大人", "🍀 你并不孤单",
        "🎵 举报霸凌", "📚 学习尊重", "🎨 用爱回应", "🤝 互相保护", "💖 网络友善"
    ];
    
    const NEGATIVE_WORDS = [
        "💢 恶意留言", "👎 嘲笑外貌", "😠 威胁恐吓", "💔 散播谣言", "🌪️ 人身攻击",
        "🔇 网络排挤", "👊 键盘暴力", "📛 贴标签", "🚫 孤立排挤", "⚡ 公开羞辱",
        "💀 匿名谩骂", "🔨 言语打击", "🌑 恶意P图", "🔥 煽动仇恨", "🗑️ 人肉搜索"
    ];
    
    // ==================== 预计算缓存 ====================
    let width, height;
    let gameState = 'start';
    let frame = 0;
    let score = 0;
    let kindness = 0;
    let bestScore = 0;
    let survivalTime = 0;
    let lastCollectedWord = '';
    let collectBubbleTimer = 0;
    
    try { bestScore = parseInt(localStorage.getItem('kindness_runner_best_v5')) || 0; } catch(e) {}
    
    let baseSpeed = 6.5;
    let currentSpeed = baseSpeed;
    const MAX_SPEED = 20;
    const HORIZON_Y_RATIO = 0.3;
    const ROAD_WIDTH_RATIO = 0.38;
    const PERSPECTIVE_STRENGTH = 1.4;
    const LANES = [-1, 0, 1];
    let currentLane = 0;
    let targetLane = 0;
    
    const player = {
        width: 50, height: 80, y: 0, vy: 0,
        jumping: false, sliding: false, slideTimer: 0,
        bobPhase: 0, legPhase: 0, armPhase: 0,
        expression: 'happy', blinkTimer: 0, eyeScale: 1
    };
    
    let negativeWords = [];
    let positiveWords = [];
    let particles = [];
    let floatingTexts = [];
    let sparkles = [];
    
    let posTimer = 0, negTimer = 0;
    const POS_INTERVAL = 28, NEG_INTERVAL = 75;
    
    // 缓存地面和地平线值
    let cachedGroundY, cachedHorizonY;
    
    // ==================== 辅助函数 ====================
    function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        cachedGroundY = height * 0.86;
        cachedHorizonY = height * HORIZON_Y_RATIO;
        generateSparkles();
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    
    function groundY() { return cachedGroundY; }
    function horizonY() { return cachedHorizonY; }
    
    function getScreenX(lane, z) {
        return width/2 + lane * width * ROAD_WIDTH_RATIO * Math.pow(z, 0.7) * PERSPECTIVE_STRENGTH;
    }
    
    function getScreenY(z) {
        return cachedHorizonY + (cachedGroundY - cachedHorizonY) * Math.pow(z, 0.85);
    }
    
    function getScale(z) { return 0.45 + z * 1.15; }
    
    function resetGame() {
        score = 0; kindness = 0; survivalTime = 0;
        currentSpeed = baseSpeed; frame = 0;
        lastCollectedWord = ''; collectBubbleTimer = 0;
        currentLane = 0; targetLane = 0;
        player.y = groundY() - player.height;
        player.vy = 0; player.jumping = false;
        player.sliding = false; player.slideTimer = 0;
        player.expression = 'happy'; player.blinkTimer = 0; player.eyeScale = 1;
        negativeWords = []; positiveWords = [];
        particles = []; floatingTexts = [];
        posTimer = 0; negTimer = 0;
        generateSparkles();
    }
    
    function generateSparkles() {
        sparkles = [];
        const count = Math.floor(width * height / 15000);
        for (let i = 0; i < count; i++) {
            sparkles.push({
                x: Math.random() * width,
                y: Math.random() * horizonY() * 1.5,
                size: 0.5 + Math.random() * 2,
                twinkle: Math.random() * Math.PI * 2,
                speed: 0.03 + Math.random() * 0.04,
                color: ['#FFD700','#FFB6C1','#87CEEB','#98FB98','#DDA0DD'][Math.floor(Math.random()*5)]
            });
        }
    }
    
    function startGame() { resetGame(); gameState = 'playing'; }
    
    function gameOver() {
        if (gameState !== 'playing') return;
        gameState = 'gameover';
        score = Math.floor(survivalTime * 10) + kindness * 50;
        if (score > bestScore) {
            bestScore = score;
            try { localStorage.setItem('kindness_runner_best_v5', bestScore); } catch(e) {}
        }
        const px = getScreenX(currentLane, 0.9);
        for (let i = 0; i < 20; i++) {
            particles.push({
                x: px + (Math.random()-0.5)*100, y: player.y + (Math.random()-0.5)*100,
                vx: (Math.random()-0.5)*6, vy: -Math.random()*8-2,
                size: 4+Math.random()*8, color: i%2?'#FF6B9D':'#FFD700',
                life: 40+Math.random()*30, decay: 0.96, type: i%2?'heart':'star'
            });
        }
    }
    
    // ==================== 游戏逻辑 ====================
    function update() {
        if (gameState !== 'playing') return;
        frame++;
        if (frame % 6 === 0) survivalTime += 0.1;
        score = Math.floor(survivalTime * 10) + kindness * 50;
        if (collectBubbleTimer > 0) collectBubbleTimer--;
        if (frame % 100 === 0 && currentSpeed < MAX_SPEED) currentSpeed = Math.min(currentSpeed+0.5, MAX_SPEED);
        
        // 车道
        currentLane += (targetLane - currentLane) * 0.25;
        if (Math.abs(currentLane - targetLane) < 0.01) currentLane = targetLane;
        
        // 物理
        player.vy += 0.8;
        player.y += player.vy;
        const floorY = groundY() - (player.sliding ? 40 : player.height);
        if (player.y >= floorY) { player.y = floorY; player.vy = 0; player.jumping = false; player.expression = 'happy'; }
        if (player.jumping) player.expression = 'excited';
        if (player.sliding) { player.slideTimer--; if (player.slideTimer <= 0) player.sliding = false; }
        
        // 动画
        player.bobPhase = Math.sin(frame * 0.1) * 4;
        player.legPhase = Math.sin(frame * 0.4) * 0.7;
        player.armPhase = Math.sin(frame * 0.35 + 1) * 0.6;
        player.blinkTimer++;
        if (player.blinkTimer > 100) { player.blinkTimer = 0; player.eyeScale = 0.1; setTimeout(()=>{player.eyeScale=1;},80); }
        
        // 生成
        posTimer--;
        if (posTimer <= 0) {
            spawnPositive();
            if (Math.random() < 0.6) spawnPositive();
            if (Math.random() < 0.3) spawnPositive();
            posTimer = Math.max(16, Math.floor(POS_INTERVAL - currentSpeed * 0.3));
        }
        negTimer--;
        if (negTimer <= 0) {
            spawnNegative();
            negTimer = Math.max(50, Math.floor(NEG_INTERVAL - currentSpeed * 0.4));
        }
        
        // 更新负面词
        for (let i = negativeWords.length-1; i >= 0; i--) {
            const w = negativeWords[i];
            w.z += 0.007 + currentSpeed * 0.001;
            if (w.z > 1.3) { negativeWords.splice(i,1); continue; }
            if (w.z > 0.7 && w.z < 1.05) {
                if (checkCollision(w)) { gameOver(); return; }
            }
        }
        
        // 更新善意词
        for (let i = positiveWords.length-1; i >= 0; i--) {
            const w = positiveWords[i];
            w.z += 0.009 + currentSpeed * 0.0012;
            if (w.z > 1.25) { positiveWords.splice(i,1); continue; }
            if (w.z > 0.7 && w.z < 1.0) {
                if (checkCollection(w)) {
                    kindness++;
                    lastCollectedWord = w.text;
                    collectBubbleTimer = 80;
                    const px = getScreenX(w.lane, w.z);
                    const py = getScreenY(w.z)-20;
                    for (let j=0; j<10; j++) {
                        particles.push({
                            x:px, y:py, vx:(Math.random()-0.5)*6, vy:(Math.random()-0.8)*5-3,
                            size:3+Math.random()*5, color:j%2?'#FFD700':'#FF6B9D',
                            life:28, decay:0.93, type:j%2?'star':'heart'
                        });
                    }
                    floatingTexts.push({x:px, y:py, text:'+50', color:'#FFD700', life:35, maxLife:35, alpha:1});
                    positiveWords.splice(i,1);
                }
            }
        }
        
        // 更新粒子
        for (let i=particles.length-1; i>=0; i--) {
            const p = particles[i];
            p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.vx *= 0.98;
            p.life--; p.size *= p.decay||0.97;
            if (p.life<=0||p.y>height+50) particles.splice(i,1);
        }
        // 更新浮动文字
        for (let i=floatingTexts.length-1; i>=0; i--) {
            const ft = floatingTexts[i];
            ft.y -= 2; ft.life--; ft.alpha = ft.life/ft.maxLife;
            if (ft.life<=0) floatingTexts.splice(i,1);
        }
        // 星星
        for (let s of sparkles) s.twinkle += s.speed;
    }
    
    function spawnPositive() {
        const count = 1 + (Math.random()>0.5?1:0);
        const lanes = [...LANES].sort(()=>Math.random()-0.5);
        for (let i=0; i<count; i++) {
            positiveWords.push({
                lane: lanes[i], z: 0.04+i*0.04,
                text: POSITIVE_WORDS[Math.floor(Math.random()*POSITIVE_WORDS.length)],
                floatOffset:0, glowPulse:1
            });
        }
    }
    
    function spawnNegative() {
        negativeWords.push({
            lane: LANES[Math.floor(Math.random()*3)],
            z: 0.04,
            text: NEGATIVE_WORDS[Math.floor(Math.random()*NEGATIVE_WORDS.length)],
            width: 0.16, height: 0.10
        });
    }
    
    function checkCollision(obs) {
        // 获取玩家世界坐标（屏幕Y）
        const playerCenterX = getScreenX(currentLane, 0.92);
        
        // 玩家碰撞箱
        let playerBoxW, playerBoxH, playerBoxY;
        if (player.sliding) {
            playerBoxW = player.width * 0.6;
            playerBoxH = 30;
            playerBoxY = player.y + 30;
        } else if (player.jumping) {
            playerBoxW = player.width * 0.45;
            playerBoxH = player.height * 0.45;
            playerBoxY = player.y + player.height * 0.15;
        } else {
            playerBoxW = player.width * 0.5;
            playerBoxH = player.height * 0.55;
            playerBoxY = player.y + player.height * 0.2;
        }
        
        // 障碍物碰撞箱
        const scale = getScale(obs.z);
        const obsW = width * obs.width * scale * 0.75;
        const obsH = height * obs.height * scale * 0.8;
        const obsCenterX = getScreenX(obs.lane, obs.z);
        const obsTopY = getScreenY(obs.z) - obsH;
        
        // X轴重叠检测
        const xOverlap = Math.abs(playerCenterX - obsCenterX) < (playerBoxW + obsW) / 2;
        if (!xOverlap) return false;
        
        // Y轴：玩家底部 vs 障碍物顶部
        const playerBottom = playerBoxY + playerBoxH;
        const playerTop = playerBoxY;
        const obsBottom = obsTopY + obsH;
        
        // 玩家完全在障碍物上方（跳跃跳过）- 不碰撞
        if (playerBottom < obsTopY + obsH * 0.2) return false;
        
        // 玩家在障碍物下方（不可能）- 不碰撞
        if (playerTop > obsBottom) return false;
        
        // 其他情况：重叠
        return true;
    }
    
    function checkCollection(word) {
        const playerCenterX = getScreenX(currentLane, 0.92);
        let playerBoxW, playerBoxH, playerBoxY;
        if (player.sliding) {
            playerBoxW = player.width * 0.6; playerBoxH = 30; playerBoxY = player.y + 30;
        } else {
            playerBoxW = player.width * 0.55; playerBoxH = player.height * 0.55; playerBoxY = player.y + player.height * 0.2;
        }
        
        const scale = getScale(word.z);
        const wordW = width * 0.13 * scale;
        const wordH = 35 * scale;
        const wordCenterX = getScreenX(word.lane, word.z);
        const wordTopY = getScreenY(word.z) - wordH - 8;
        
        return Math.abs(playerCenterX - wordCenterX) < (playerBoxW + wordW)/2 &&
               Math.abs(playerBoxY - wordTopY) < (playerBoxH + wordH)/2;
    }
    
    // ==================== 输入 ====================
    function moveLeft() {
        if (gameState==='start') startGame();
        if (gameState!=='playing') return;
        targetLane = Math.max(-1, targetLane-1);
    }
    function moveRight() {
        if (gameState==='start') startGame();
        if (gameState!=='playing') return;
        targetLane = Math.min(1, targetLane+1);
    }
    function jump() {
        if (gameState==='start') startGame();
        if (gameState!=='playing') return;
        if (!player.jumping && !player.sliding) {
            player.vy = -19;
            player.jumping = true;
            player.expression = 'excited';
        }
    }
    function slide() {
        if (gameState==='start') startGame();
        if (gameState!=='playing') return;
        if (!player.jumping && !player.sliding) {
            player.sliding = true; player.slideTimer = 28;
        }
    }
    
    document.addEventListener('keydown', (e) => {
        if (e.code==='ArrowLeft'||e.code==='KeyA') { e.preventDefault(); moveLeft(); }
        if (e.code==='ArrowRight'||e.code==='KeyD') { e.preventDefault(); moveRight(); }
        if (e.code==='ArrowUp'||e.code==='Space'||e.code==='KeyW') { e.preventDefault(); jump(); }
        if (e.code==='ArrowDown'||e.code==='KeyS') { e.preventDefault(); slide(); }
        if (e.code==='Enter'&&gameState!=='playing') startGame();
    });
    
    let ts = {x:0,y:0};
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        ts.x = e.touches[0].clientX; ts.y = e.touches[0].clientY;
        if (gameState!=='playing') startGame();
    }, {passive:false});
    canvas.addEventListener('touchmove', (e) => e.preventDefault(), {passive:false});
    canvas.addEventListener('touchend', (e) => {
        e.preventDefault();
        if (gameState!=='playing') return;
        const dx = e.changedTouches[0].clientX - ts.x;
        const dy = e.changedTouches[0].clientY - ts.y;
        if (Math.abs(dx)>Math.abs(dy)) { if(dx>20) moveRight(); else if(dx<-20) moveLeft(); }
        else { if(dy<-20) jump(); else if(dy>20) slide(); }
    });
    canvas.addEventListener('mousedown', () => { if(gameState!=='playing') startGame(); });
    canvas.addEventListener('contextmenu', (e) => e.preventDefault());
    
    // ==================== 渲染 ====================
    function draw() {
        ctx.clearRect(0, 0, width, height);
        
        // 天空
        const skyGrad = ctx.createLinearGradient(0,0,0,horizonY()+50);
        skyGrad.addColorStop(0,'#1a1a3e'); skyGrad.addColorStop(0.4,'#2d2b55');
        skyGrad.addColorStop(0.8,'#5b4a7a'); skyGrad.addColorStop(1,'#8b7aa0');
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0,0,width,horizonY()+40);
        
        // 星光
        for (let s of sparkles) {
            ctx.globalAlpha = 0.25 + Math.sin(s.twinkle)*0.25;
            ctx.fillStyle = s.color;
            ctx.beginPath(); ctx.arc(s.x,s.y,s.size,0,Math.PI*2); ctx.fill();
        }
        ctx.globalAlpha = 1;
        
        // 城市
        const colors = ['#FFB6C1','#FFDAB9','#B0E0E6','#DDA0DD','#98FB98','#FFE4B5'];
        const hY = horizonY();
        for (let i=0; i<6; i++) {
            const x = (i*130+frame*0.2)%(width+200)-100;
            const w = 40+Math.sin(i)*10, h = 50+(i%3)*20;
            ctx.fillStyle = colors[i%6]; ctx.globalAlpha = 0.5;
            ctx.fillRect(x, hY-h+15, w, h);
            ctx.fillStyle = '#E8A0B0'; ctx.globalAlpha = 0.45;
            ctx.beginPath(); ctx.moveTo(x-4,hY-h+15); ctx.lineTo(x+w/2,hY-h-8); ctx.lineTo(x+w+4,hY-h+15); ctx.fill();
            ctx.fillStyle = '#FFF8DC'; ctx.globalAlpha = 0.6;
            for (let r=0;r<2;r++) for (let c=0;c<2;c++) ctx.fillRect(x+7+c*14, hY-h+24+r*16, 7, 9);
        }
        ctx.globalAlpha = 1;
        
        // 道路
        const gY = groundY();
        ctx.beginPath();
        ctx.moveTo(width*0.22,hY); ctx.lineTo(width*0.78,hY);
        ctx.lineTo(width*0.96,gY); ctx.lineTo(width*0.04,gY);
        ctx.closePath();
        const roadGrad = ctx.createLinearGradient(0,hY,0,gY);
        roadGrad.addColorStop(0,'#4A6FA5'); roadGrad.addColorStop(1,'#2C3E50');
        ctx.fillStyle = roadGrad; ctx.fill();
        
        // 车道线
        ctx.strokeStyle = '#FECA57'; ctx.lineWidth = 2.5;
        for (let li=-0.5; li<=0.5; li+=1) {
            for (let i=0; i<12; i++) {
                const z1=i/12, z2=(i+0.4)/12;
                const x1=getScreenX(li,z1), x2=getScreenX(li,z2);
                const y1=getScreenY(z1), y2=getScreenY(z2);
                if (((i/12+frame*currentSpeed*0.006)%1)<0.5) {
                    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
                }
            }
        }
        
        // 排序渲染
        const list = [
            ...negativeWords.map(w=>({t:'n',z:w.z,d:w})),
            ...positiveWords.map(w=>({t:'p',z:w.z,d:w}))
        ].sort((a,b)=>a.z-b.z);
        
        for (let item of list) {
            if (item.t==='n') drawNeg(item.d);
            else drawPos(item.d);
        }
        
        drawPlayer();
        drawParticles();
        drawFloating();
        drawBubble();
        drawUI();
        
        if (gameState==='start') drawStart();
        else if (gameState==='gameover') drawOver();
    }
    
    function drawNeg(w) {
        const x = getScreenX(w.lane, w.z);
        const y = getScreenY(w.z);
        const s = getScale(w.z);
        const ww = width*w.width*s, wh = height*w.height*s;
        ctx.fillStyle = '#8B7B8B';
        ctx.beginPath(); roundRect(x-ww/2, y-wh, ww, wh, 6); ctx.fill();
        ctx.strokeStyle = '#FF4444'; ctx.lineWidth = 2*s;
        ctx.setLineDash([3,3]); ctx.stroke(); ctx.setLineDash([]);
        ctx.fillStyle = '#FFF';
        ctx.font = `bold ${Math.floor(11*s)}px "Microsoft YaHei"`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(w.text, x, y-wh/2);
    }
    
    function drawPos(w) {
        const x = getScreenX(w.lane, w.z);
        const y = getScreenY(w.z) + Math.sin(frame*0.08+w.z)*4;
        const s = getScale(w.z);
        const ww = width*0.13*s, wh = 35*s;
        const g = ctx.createLinearGradient(x-ww/2, y-wh-10, x+ww/2, y-10);
        g.addColorStop(0,'#FFF8DC'); g.addColorStop(0.5,'#FFD700'); g.addColorStop(1,'#FFA500');
        ctx.fillStyle = g;
        ctx.shadowColor = 'rgba(255,215,0,0.5)'; ctx.shadowBlur = 15*s;
        ctx.beginPath(); roundRect(x-ww/2, y-wh-10, ww, wh, 10); ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#4A3728';
        ctx.font = `bold ${Math.floor(10*s)}px "Microsoft YaHei"`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(w.text, x, y-wh/2-10);
    }
    
    function drawPlayer() {
        const px = getScreenX(currentLane, 0.92);
        const py = player.y + player.bobPhase;
        const pw = player.width, ph = player.sliding?38:player.height;
        
        ctx.save(); ctx.translate(px, py);
        if (player.sliding) ctx.rotate(-0.1);
        
        // 阴影
        ctx.fillStyle = 'rgba(0,0,0,0.18)';
        ctx.beginPath(); ctx.ellipse(0, ph-4, pw*0.35, 6, 0, 0, Math.PI*2); ctx.fill();
        
        const by = player.sliding?-ph/2+15:-ph/2;
        // 身体
        const bg = ctx.createLinearGradient(-pw/2,-ph/2,pw/2,ph/2);
        bg.addColorStop(0,'#5DADE2'); bg.addColorStop(0.5,'#3498DB'); bg.addColorStop(1,'#2874A6');
        ctx.fillStyle = bg;
        ctx.beginPath(); roundRect(-pw/2, by, pw, ph*0.6, 12); ctx.fill();
        
        // 头
        const hY2 = by - ph*0.28, hR = pw*0.3;
        ctx.fillStyle = '#FFE4C4';
        ctx.beginPath(); ctx.arc(0, hY2, hR, 0, Math.PI*2); ctx.fill();
        // 头发
        ctx.fillStyle = '#4A3728';
        ctx.beginPath(); ctx.arc(0, hY2-hR*0.55, hR*1.05, 0.15, Math.PI-0.15); ctx.fill();
        for (let h=0;h<4;h++) {
            ctx.beginPath(); ctx.arc(-hR*0.45+h*hR*0.3, hY2-hR*0.78, hR*0.2, 0, Math.PI*2); ctx.fill();
        }
        
        // 眼睛
        const eY = hY2 - hR*0.08, es = hR*0.33;
        ctx.fillStyle = '#FFF';
        ctx.beginPath(); ctx.ellipse(-es,eY,hR*0.2,hR*0.26*player.eyeScale,0,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(es,eY,hR*0.2,hR*0.26*player.eyeScale,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = '#2C1810';
        if (player.expression==='excited') {
            star(-es,eY,hR*0.07,5,3); star(es,eY,hR*0.07,5,3);
        } else {
            ctx.beginPath(); ctx.arc(-es,eY,hR*0.09,0,Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(es,eY,hR*0.09,0,Math.PI*2); ctx.fill();
        }
        ctx.fillStyle = '#FFF';
        ctx.beginPath(); ctx.arc(-es-hR*0.05,eY-hR*0.07,hR*0.04,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(es-hR*0.05,eY-hR*0.07,hR*0.04,0,Math.PI*2); ctx.fill();
        
        // 腮红
        ctx.fillStyle = 'rgba(255,182,193,0.45)';
        ctx.beginPath(); ctx.ellipse(-es-hR*0.2,eY+hR*0.18,hR*0.1,hR*0.06,0,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(es+hR*0.2,eY+hR*0.18,hR*0.1,hR*0.06,0,0,Math.PI*2); ctx.fill();
        
        // 微笑
        ctx.strokeStyle = '#C0392B'; ctx.lineWidth = 1.8; ctx.lineCap = 'round';
        ctx.beginPath();
        if (player.expression==='excited') ctx.arc(0,eY+hR*0.12,hR*0.18,0.08,Math.PI-0.08);
        else ctx.arc(0,eY+hR*0.08,hR*0.16,0.12,Math.PI-0.12);
        ctx.stroke();
        
        // 帽子
        ctx.fillStyle = '#FF6B6B';
        ctx.beginPath(); ctx.arc(0,hY2-hR*0.3,hR*0.65,0.15,Math.PI-0.15);
        ctx.arc(0,hY2-hR*0.18,hR*0.6,Math.PI-0.15,0.15,true); ctx.fill();
        ctx.fillStyle = '#FFD700';
        ctx.beginPath(); ctx.arc(0,hY2-hR*0.48,hR*0.08,0,Math.PI*2); ctx.fill();
        
        // 手臂
        ctx.strokeStyle = '#FFE4C4'; ctx.lineWidth = 5; ctx.lineCap = 'round';
        const as = player.armPhase*7;
        ctx.beginPath(); ctx.moveTo(-pw*0.3,by+ph*0.05); ctx.lineTo(-pw*0.48+as,by+ph*0.18); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(pw*0.3,by+ph*0.05); ctx.lineTo(pw*0.48-as,by+ph*0.18); ctx.stroke();
        ctx.fillStyle = '#FF6B6B';
        ctx.beginPath(); ctx.arc(-pw*0.48+as,by+ph*0.18,4,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(pw*0.48-as,by+ph*0.18,4,0,Math.PI*2); ctx.fill();
        
        // 腿
        if (!player.sliding) {
            ctx.strokeStyle = '#3498DB'; ctx.lineWidth = 6;
            const ls = player.legPhase*7;
            ctx.beginPath(); ctx.moveTo(-4,by+ph*0.5); ctx.lineTo(-7+ls,by+ph*0.8); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(4,by+ph*0.5); ctx.lineTo(7-ls,by+ph*0.8); ctx.stroke();
            ctx.fillStyle = '#FF6B6B';
            ctx.beginPath(); roundRect(-14+ls,by+ph*0.76,14,7,3); ctx.fill();
            ctx.beginPath(); roundRect(0-ls,by+ph*0.76,14,7,3); ctx.fill();
        }
        
        ctx.restore();
    }
    
    function star(cx,cy,or,pts,ir) {
        const step = Math.PI/pts;
        ctx.beginPath();
        for (let i=0;i<2*pts;i++) {
            const r = i%2?ir:or, a = i*step-Math.PI/2;
            const x=cx+Math.cos(a)*r, y=cy+Math.sin(a)*r;
            i?ctx.lineTo(x,y):ctx.moveTo(x,y);
        }
        ctx.closePath(); ctx.fill();
    }
    
    function drawParticles() {
        for (let p of particles) {
            ctx.globalAlpha = Math.min(1,p.life/30);
            ctx.fillStyle = p.color;
            if (p.type==='heart') {
                const s=p.size*0.6;
                ctx.beginPath();
                ctx.moveTo(p.x,p.y+s*0.3);
                ctx.bezierCurveTo(p.x,p.y-s*0.5,p.x-s,p.y-s*0.3,p.x-s,p.y+s*0.2);
                ctx.bezierCurveTo(p.x-s,p.y+s*0.8,p.x,p.y+s*1.2,p.x,p.y+s);
                ctx.bezierCurveTo(p.x,p.y+s*1.2,p.x+s,p.y+s*0.8,p.x+s,p.y+s*0.2);
                ctx.bezierCurveTo(p.x+s,p.y-s*0.3,p.x,p.y-s*0.5,p.x,p.y+s*0.3);
                ctx.fill();
            } else {
                star(p.x,p.y,p.size*0.5,5,p.size*0.2);
            }
        }
        ctx.globalAlpha = 1;
    }
    
    function drawFloating() {
        for (let ft of floatingTexts) {
            ctx.globalAlpha = ft.alpha;
            ctx.fillStyle = ft.color;
            ctx.font = 'bold 15px "Microsoft YaHei"';
            ctx.textAlign = 'center';
            ctx.fillText(ft.text, ft.x, ft.y);
        }
        ctx.globalAlpha = 1;
    }
    
    function drawBubble() {
        if (collectBubbleTimer<=0||!lastCollectedWord) return;
        const px = getScreenX(currentLane, 0.92);
        const alpha = Math.min(1, collectBubbleTimer/30);
        const fy = (80-collectBubbleTimer)*0.8;
        ctx.save(); ctx.globalAlpha = alpha;
        ctx.translate(px, player.y-65-fy);
        ctx.fillStyle = '#FFF8DC';
        ctx.beginPath(); roundRect(-68,-20,136,38,18); ctx.fill();
        ctx.fillStyle = '#FFF8DC';
        ctx.beginPath(); ctx.moveTo(-4,17); ctx.lineTo(4,17); ctx.lineTo(0,32); ctx.fill();
        ctx.fillStyle = '#4A3728';
        ctx.font = 'bold 13px "Microsoft YaHei"';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(lastCollectedWord+' +50', 0, -1);
        ctx.restore();
    }
    
    function drawUI() {
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.beginPath(); roundRect(10,10,210,85,15); ctx.fill();
        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 24px "Microsoft YaHei"';
        ctx.textAlign = 'left';
        ctx.fillText('🏆 '+score, 25, 42);
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 18px "Microsoft YaHei"';
        ctx.fillText('💖 善意 × '+kindness, 25, 70);
        
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.beginPath(); roundRect(width-150,10,140,48,15); ctx.fill();
        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 16px "Microsoft YaHei"';
        ctx.textAlign = 'center';
        ctx.fillText('⏱️ '+survivalTime.toFixed(1)+'s', width-80, 40);
        
        const sp = (currentSpeed-baseSpeed)/(MAX_SPEED-baseSpeed);
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        ctx.fillRect(16,height-24,150,10);
        const sg = ctx.createLinearGradient(16,0,166,0);
        sg.addColorStop(0,'#2ECC71'); sg.addColorStop(0.5,'#F1C40F'); sg.addColorStop(1,'#E74C3C');
        ctx.fillStyle = sg;
        ctx.fillRect(16,height-24,150*sp,10);
    }
    
    function drawStart() {
        ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0,0,width,height);
        const tY = height*0.22;
        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        ctx.beginPath(); roundRect(width/2-160,tY-25,320,190,22); ctx.fill();
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 34px "Microsoft YaHei"';
        ctx.textAlign = 'center';
        ctx.fillText('🛡️ 善意小英雄', width/2, tY+15);
        ctx.fillStyle = '#FFF';
        ctx.font = '16px "Microsoft YaHei"';
        ctx.fillText('收集反霸凌正能量 · 躲避网络恶意', width/2, tY+50);
        ctx.fillStyle = '#FFB6C1';
        ctx.font = 'bold 18px "Microsoft YaHei"';
        ctx.fillText('💖 善意值×50 + ⏱️ 坚持时长×10 = 总分', width/2, tY+78);
        ctx.fillStyle = '#FFF';
        ctx.font = '14px "Microsoft YaHei"';
        ctx.fillText('← → 移动 | ↑ 跳跃 | ↓ 滑铲', width/2, height*0.62);
        ctx.fillText('点击屏幕或按 Enter 开始', width/2, height*0.68);
    }
    
    function drawOver() {
        ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0,0,width,height);
        ctx.fillStyle = '#FF6B9D';
        ctx.font = 'bold 36px "Microsoft YaHei"';
        ctx.textAlign = 'center';
        ctx.fillText('💪 继续加油！', width/2, height*0.28);
        ctx.fillStyle = '#FFF';
        ctx.font = '22px "Microsoft YaHei"';
        ctx.fillText('总分: '+score, width/2, height*0.37);
        ctx.fillStyle = '#FFD700';
        ctx.font = '18px "Microsoft YaHei"';
        ctx.fillText('💖 善意:'+kindness+' | ⏱️ '+survivalTime.toFixed(1)+'s', width/2, height*0.45);
        ctx.fillStyle = '#87CEEB';
        ctx.font = '15px "Microsoft YaHei"';
        ctx.fillText('遇到网络霸凌要告诉信任的大人哦', width/2, height*0.54);
        if (score>=bestScore&&score>0) {
            ctx.fillStyle = '#2ECC71';
            ctx.font = 'bold 22px "Microsoft YaHei"';
            ctx.fillText('🎉 新纪录！最棒的小英雄！', width/2, height*0.63);
        }
        ctx.fillStyle = '#BDC3C7';
        ctx.font = '16px "Microsoft YaHei"';
        ctx.fillText('点击屏幕重新挑战', width/2, height*0.74);
    }
    
    function roundRect(x,y,w,h,r) {
        if(w<2*r) r=w/2; if(h<2*r) r=h/2;
        ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
        ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
        ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
        ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
        ctx.quadraticCurveTo(x,y,x+r,y);
    }
    
    // ==================== 游戏循环 ====================
    function gameLoop() {
        if (gameState==='playing') update();
        draw();
        requestAnimationFrame(gameLoop);
    }
    
    resetGame();
    gameLoop();
    
})();
</script>
