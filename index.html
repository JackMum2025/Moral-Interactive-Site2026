<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>德润童心 · 师范德育专题</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', '微软雅黑', system-ui, sans-serif;
      background-color: #fbfaf6;
      color: #2e3b2c;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background-color: #d9e6d3;
      padding: 1.2rem 2rem;
      border-bottom: 3px solid #9bb88b;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
    }

    header h1 {
      font-size: 2.2rem;
      font-weight: 500;
      letter-spacing: 2px;
      color: #2d4e1e;
      margin-bottom: 0.5rem;
    }

    nav {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
    }

    nav a {
      text-decoration: none;
      color: #3a5e2b;
      font-weight: 500;
      font-size: 1.2rem;
      padding: 0.25rem 0;
      border-bottom: 2px solid transparent;
      transition: border-color 0.2s;
    }

    nav a:hover {
      border-bottom-color: #5b8c4e;
    }

    main {
      flex: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      width: 100%;
    }

    .hero {
      background: linear-gradient(145deg, #e6f0e2 0%, #f8fbf7 100%);
      padding: 2.5rem 2rem;
      border-radius: 32px;
      margin-bottom: 2.5rem;
      text-align: center;
      box-shadow: 0 6px 14px rgba(90, 110, 70, 0.08);
      border: 1px solid #c8dcc0;
    }

    .hero h2 {
      font-size: 2.5rem;
      font-weight: 400;
      color: #1f3b14;
      margin-bottom: 0.5rem;
    }

    .hero p {
      font-size: 1.4rem;
      color: #43673a;
      font-style: italic;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.8rem;
      margin: 2rem 0 2.5rem;
    }

    .card {
      background: white;
      padding: 1.8rem 1.5rem;
      border-radius: 24px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.04);
      border: 1px solid #dfe9d9;
      text-align: center;
      transition: transform 0.15s, box-shadow 0.2s;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 16px 28px rgba(80, 110, 60, 0.1);
      border-color: #b3cfaa;
    }

    .card-icon {
      font-size: 3rem;
      margin-bottom: 0.75rem;
    }

    .card h3 {
      font-size: 1.6rem;
      font-weight: 500;
      color: #2f5126;
      margin-bottom: 0.5rem;
    }

    .card p {
      color: #4a5e42;
      font-size: 1rem;
    }

    /* 留言板板块 */
    .message-section {
      background: white;
      border-radius: 24px;
      padding: 1.8rem;
      margin-top: 1rem;
      box-shadow: 0 6px 16px rgba(0,0,0,0.04);
      border: 1px solid #d9e6d3;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.2rem;
      padding-bottom: 0.75rem;
      border-bottom: 2px solid #e2ecdc;
    }

    .section-header h2 {
      color: #3a5e2b;
      font-weight: 400;
      font-size: 1.6rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .anonymous-badge {
      background: #d9e6d3;
      padding: 0.3rem 1.2rem;
      border-radius: 30px;
      font-size: 0.85rem;
      color: #3a5e2b;
    }

    .message-tip {
      background: #e8f0e3;
      border-radius: 16px;
      padding: 0.8rem 1.2rem;
      margin-bottom: 1.2rem;
      color: #4a6040;
      font-size: 0.95rem;
    }

    /* 留言输入区 */
    .message-form {
      background: #f8fbf7;
      border-radius: 20px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      border: 1px solid #d9e6d3;
    }

    textarea {
      width: 100%;
      padding: 1rem;
      border: 2px solid #d9e6d3;
      border-radius: 20px;
      font-size: 1rem;
      resize: vertical;
      min-height: 100px;
      margin-bottom: 1rem;
      font-family: inherit;
    }

    textarea:focus {
      outline: none;
      border-color: #7fa86a;
    }

    .btn {
      background: #7fa86a;
      color: white;
      border: none;
      padding: 0.8rem 2rem;
      font-size: 1.1rem;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.2s;
    }

    .btn:hover {
      background: #5b8c4e;
    }

    .btn:disabled {
      background: #b3cba7;
      cursor: not-allowed;
    }

    /* 留言列表 */
    .message-list {
      max-height: 400px;
      overflow-y: auto;
      padding-right: 0.5rem;
    }

    .message-item {
      background: #fafbf9;
      border-radius: 16px;
      padding: 1rem 1.2rem;
      margin-bottom: 0.8rem;
      border: 1px solid #e2ecdc;
    }

    .message-content {
      color: #2e3b2c;
      word-break: break-word;
    }

    .message-status {
      text-align: center;
      padding: 1rem;
      color: #999;
    }

    .message-status.loading {
      color: #7fa86a;
    }

    .message-status.error {
      color: #c44;
    }

    .empty-message {
      text-align: center;
      color: #aaa;
      padding: 2rem;
      font-style: italic;
    }

    .civility-note {
      margin-top: 1rem;
      text-align: center;
      color: #8aa67d;
      font-size: 0.9rem;
    }

    .refresh-info {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.5rem;
    }

    .auto-refresh-badge {
      background: #d9e6d3;
      padding: 0.2rem 0.8rem;
      border-radius: 20px;
      font-size: 0.75rem;
      color: #3a5e2b;
    }

    .manual-refresh-btn {
      background: none;
      border: 1px solid #b3cba7;
      color: #5b8c4e;
      padding: 0.2rem 1rem;
      border-radius: 20px;
      font-size: 0.75rem;
      cursor: pointer;
    }

    .manual-refresh-btn:hover {
      background: #e8f0e3;
    }

    footer {
      background-color: #d9e6d3;
      padding: 1.5rem;
      text-align: center;
      color: #36522b;
      font-size: 0.95rem;
      border-top: 2px solid #b3cba7;
      margin-top: 2rem;
    }

    @media (max-width: 600px) {
      header h1 { font-size: 1.8rem; }
      nav { gap: 1.2rem; }
      .hero h2 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>🌱 德润童心</h1>
    <nav>
      <a href="index.html">🏠 首页</a>
      <a href="virtues.html">📜 传统美德</a>
      <a href="stories.html">📖 德育故事</a>
      <a href="quotes.html">✨ 名言警句</a>
      <a href="about.html">📋 关于课程</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h2>“道德是做人的根本”</h2>
      <p>—— 陶行知</p>
    </section>

    <div class="card-grid">
      <a href="virtues.html" class="card">
        <div class="card-icon">🌿</div>
        <h3>传统美德</h3>
        <p>孝、悌、忠、信、礼、义、廉、耻</p>
      </a>
      <a href="stories.html" class="card">
        <div class="card-icon">📚</div>
        <h3>德育故事</h3>
        <p>孔融让梨、曾子杀彘……</p>
      </a>
      <a href="quotes.html" class="card">
        <div class="card-icon">💬</div>
        <h3>名言警句</h3>
        <p>古今中外的道德箴言</p>
      </a>
      <a href="#message-wall" class="card">
        <div class="card-icon">📝</div>
        <h3>留言墙</h3>
        <p>留下你的心声</p>
      </a>
    </div>

    <!-- 留言板板块（使用你原有的 Google Sheets 配置） -->
    <section class="message-section" id="message-wall">
      <div class="section-header">
        <h2>
          <span>💬</span>
          <span>班级心语 · 留言墙</span>
        </h2>
        <span class="anonymous-badge">🕶️ 匿名留言 · 自动刷新</span>
      </div>
      
      <div class="message-tip">
        💡 留下你想说的话，所有人实时看到。文明交流，友善表达。
      </div>

      <!-- 留言输入区 -->
      <div class="message-form">
        <textarea id="comment" placeholder="写下你想说的话……"></textarea>
        <button class="btn" id="submitBtn" onclick="submitMessage()">🌱 发布留言</button>
      </div>

      <!-- 留言列表区 -->
      <div class="refresh-info">
        <span class="auto-refresh-badge">🔄 每30秒自动刷新</span>
        <button class="manual-refresh-btn" onclick="loadMessages()">↻ 手动刷新</button>
      </div>
      
      <div class="message-list" id="messageList">
        <div id="message-status" class="message-status loading">正在加载留言...</div>
        <div id="message-items"></div>
      </div>

      <div class="civility-note">
        🌱 留言即代表同意遵守班级网络文明公约
      </div>
    </section>
  </main>

  <footer>
    <p>© 2026 德润童心 · 师范学校（课程作业） | 德育如细雨，润物细无声</p>
  </footer>

  <script>
    // ==================== 你的原始配置（完全保留） ====================
    const CONFIG = {
      googleScriptUrl: "https://script.google.com/macros/s/AKfycbw55PFmrpGe6chTrZeB1QtGhCwHAKABz3tWr9TOlsbKMQgKSkv6pD1T0NIK4_b3_EGW/exec",
      sheetApiUrl: "https://opensheet.elk.sh/13cZDJXzzD0OaGJIb0qlnCwmV6hjl_ruJzOhDLkYmZqw/Sheet1",
      refreshInterval: 30000 // 30秒自动刷新
    };

    // ==================== 留言功能（从你的原始代码提取） ====================
    
    // 提交留言
    async function submitMessage() {
      const commentInput = document.getElementById("comment");
      const submitBtn = document.getElementById("submitBtn");
      const comment = commentInput.value.trim();
      
      if (!comment) {
        alert("留言内容不能为空！");
        return;
      }
      
      try {
        submitBtn.disabled = true;
        submitBtn.textContent = "提交中...";
        
        await fetch(CONFIG.googleScriptUrl, {
          method: 'POST',
          body: new URLSearchParams({ 'comment': comment })
        });
        
        commentInput.value = "";
        alert("留言成功！");
        
        // 立即刷新留言
        await loadMessages();
      } catch (error) {
        console.error('留言失败:', error);
        alert("留言失败，请稍后再试");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "🌱 发布留言";
      }
    }

    // 加载留言
    async function loadMessages() {
      const statusEl = document.getElementById("message-status");
      const itemsContainer = document.getElementById("message-items");
      
      try {
        statusEl.textContent = "正在加载留言...";
        statusEl.className = "message-status loading";
        
        const response = await fetch(CONFIG.sheetApiUrl);
        if (!response.ok) throw new Error("网络响应不正常");
        
        const data = await response.json();
        
        itemsContainer.innerHTML = "";
        
        if (!data || data.length === 0) {
          statusEl.textContent = "";
          itemsContainer.innerHTML = '<div class="empty-message">✨ 还没有留言，快来写下第一条吧</div>';
          return;
        }
        
        // 按时间倒序显示（最新的在前面）
        const messages = data.reverse();
        let html = '';
        messages.forEach(item => {
          if (item["留言"]) {
            html += `
              <div class="message-item">
                <div class="message-content">${escapeHtml(item["留言"])}</div>
              </div>
            `;
          }
        });
        
        itemsContainer.innerHTML = html;
        statusEl.textContent = `📋 共 ${messages.length} 条留言`;
        statusEl.className = "message-status";
      } catch (error) {
        console.error("加载留言失败:", error);
        statusEl.textContent = "留言加载失败，请刷新重试";
        statusEl.className = "message-status error";
        itemsContainer.innerHTML = '';
      }
    }

    // 简单的 XSS 防护
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ==================== 自动刷新功能（从你的原始代码提取） ====================
    
    function initAutoRefresh() {
      // 初始加载
      loadMessages();
      
      // 设置定时自动刷新
      setInterval(loadMessages, CONFIG.refreshInterval);
    }

    // ==================== 页面初始化 ====================
    
    document.addEventListener("DOMContentLoaded", function() {
      initAutoRefresh();
    });

    // 让手动刷新按钮也能调用 loadMessages（已通过 onclick 绑定）
  </script>
</body>
</html>
