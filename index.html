<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>德润童心 · Menyuburkan Moral Muda</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', '微软雅黑', system-ui, sans-serif;
      background-color: #fbfaf6;
      color: #2e3b2c;
      line-height: 1.6;
      min-height: 100vh;
    }

    .screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background: linear-gradient(145deg, #e6f0e2 0%, #f8fbf7 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 1.5rem;
      overflow-y: auto;
    }

    .card {
      background: white;
      max-width: 550px;
      width: 100%;
      padding: 2rem 1.8rem;
      border-radius: 32px;
      box-shadow: 0 12px 28px rgba(80, 110, 60, 0.12);
      border: 1px solid #c8dcc0;
      margin: auto;
    }

    .card-icon { font-size: 3.5rem; margin-bottom: 0.5rem; text-align: center; }
    h1 { color: #2d4e1e; font-size: 1.8rem; font-weight: 500; margin-bottom: 0.3rem; text-align: center; }
    .subtitle { color: #6b7c63; margin-bottom: 1.5rem; border-bottom: 1px solid #d9e6d3; padding-bottom: 1rem; text-align: center; }

    .form-group { text-align: left; margin-bottom: 1.2rem; }
    .form-group label { display: block; color: #3a5e2b; font-weight: 500; margin-bottom: 0.3rem; }
    .form-group select, .form-group input {
      width: 100%;
      padding: 0.8rem 1rem;
      border: 2px solid #d9e6d3;
      border-radius: 40px;
      font-size: 1rem;
      background: white;
    }
    .form-group select:focus, .form-group input:focus { outline: none; border-color: #7fa86a; }

    .btn {
      background: #7fa86a;
      color: white;
      border: none;
      padding: 1rem 2rem;
      font-size: 1.2rem;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 500;
      width: 100%;
      transition: background 0.2s;
      margin-top: 1rem;
    }
    .btn:hover { background: #5b8c4e; }

    .privacy-note { margin-top: 1rem; font-size: 0.8rem; color: #9bb88b; text-align: center; }
    .error-message { color: #c44; font-size: 0.85rem; margin-top: 0.3rem; display: none; }

    /* 语言选择弹窗 */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 9999;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.active { display: flex; }

    .modal-card {
      background: white;
      max-width: 400px;
      width: 90%;
      padding: 2rem 1.5rem;
      border-radius: 32px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      animation: popIn 0.3s ease-out;
    }

    @keyframes popIn {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .lang-buttons {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .lang-btn {
      padding: 1rem 1.5rem;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      font-size: 1.2rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .lang-btn.cn {
      background: #7fa86a;
      color: white;
    }
    .lang-btn.cn:hover { background: #5b8c4e; transform: translateY(-2px); }

    .lang-btn.ms {
      background: #4a6fa5;
      color: white;
    }
    .lang-btn.ms:hover { background: #3a5a8a; transform: translateY(-2px); }

    @media (min-width: 600px) {
      h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>

<!-- ========== 欢迎页 / Halaman Selamat Datang ========== -->
<div id="welcomeScreen" class="screen">
  <div class="card">
    <div class="card-icon">🌱</div>
    <h1>德润童心<br><span style="font-size: 1rem; color: #6b7c63;">Menyuburkan Moral Muda</span></h1>
    <div class="subtitle">请告诉我们你是谁<br><span style="font-size: 0.85rem; color: #8aa67d;">Sila beritahu kami siapa anda</span></div>

    <form onsubmit="return false;">
      <div class="form-group">
        <label>📚 年级 <span style="color:#8aa67d;">/ Tahun</span></label>
        <select id="grade" required>
          <option value="">-- 请选择 / Sila pilih --</option>
          <option value="一年级">一年级 / Tahun 1</option>
          <option value="二年级">二年级 / Tahun 2</option>
          <option value="三年级">三年级 / Tahun 3</option>
          <option value="四年级">四年级 / Tahun 4</option>
          <option value="五年级">五年级 / Tahun 5</option>
          <option value="六年级">六年级 / Tahun 6</option>
          <option value="师范生">师范生 / Pelajar IPG</option>
        </select>
      </div>

      <div class="form-group">
        <label>👤 身份 <span style="color:#8aa67d;">/ Peranan</span></label>
        <select id="role" required>
          <option value="">-- 请选择 / Sila pilih --</option>
          <option value="学生">学生 / Pelajar</option>
          <option value="老师">老师 / Guru</option>
        </select>
      </div>

      <div class="form-group">
        <label>✏️ 名字/昵称 <span style="color:#8aa67d;">/ Nama/Gelaran</span></label>
        <input type="text" id="userName" placeholder="例如 Cth: Ali" maxlength="20" required>
      </div>

      <div class="error-message" id="welcomeError">请填写完整信息 / Sila isi maklumat lengkap</div>
      <button class="btn" onclick="showLanguageModal()">📝 开始道德小测验 →<br><span style="font-size:0.85rem;">Mulakan Kuiz Moral →</span></button>
    </form>
    <div class="privacy-note">你的信息仅用于本次课堂互动<br><span style="font-size:0.75rem;">Maklumat anda hanya untuk interaksi kelas ini</span></div>
  </div>
</div>

<!-- ========== 语言选择弹窗 ========== -->
<div class="modal-overlay" id="languageModal">
  <div class="modal-card">
    <div style="font-size: 3rem; margin-bottom: 0.5rem;">🌐</div>
    <h2 style="color: #2d4e1e; margin-bottom: 0.5rem;">选择语言<br><span style="font-size: 1rem; color: #6b7c63;">Pilih Bahasa</span></h2>
    <p style="color: #8aa67d; margin-bottom: 1rem;">请选择你要使用的语言版本<br><span style="font-size: 0.85rem;">Sila pilih versi bahasa anda</span></p>
    <div class="lang-buttons">
      <button class="lang-btn cn" onclick="selectLanguage('cn')">🇨🇳 中文版<br><span style="font-size:0.85rem;">Versi Bahasa Cina</span></button>
      <button class="lang-btn ms" onclick="selectLanguage('ms')">🇲🇾 Bahasa Melayu<br><span style="font-size:0.85rem;">马来文版</span></button>
    </div>
  </div>
</div>

<script>
let currentUser = null;

function showLanguageModal() {
  const grade = document.getElementById('grade').value;
  const role = document.getElementById('role').value;
  const name = document.getElementById('userName').value.trim();
  
  if (!grade || !role || !name) {
    document.getElementById('welcomeError').style.display = 'block';
    return;
  }
  
  currentUser = { grade, role, name, timestamp: new Date().toISOString() };
  localStorage.setItem('moralEduUserInfo', JSON.stringify(currentUser));
  
  document.getElementById('languageModal').classList.add('active');
}

function selectLanguage(lang) {
  if (lang === 'cn') {
    window.location.href = 'zh.html';
  } else if (lang === 'ms') {
    window.location.href = 'ms.html';
  }
}

// 初始化
document.addEventListener('DOMContentLoaded', function() {
  const saved = localStorage.getItem('moralEduUserInfo');
  if (saved) {
    currentUser = JSON.parse(saved);
    document.getElementById('grade').value = currentUser.grade || '';
    document.getElementById('role').value = currentUser.role || '';
    document.getElementById('userName').value = currentUser.name || '';
  }
});
</script>
</body>
</html>
