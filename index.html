<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>德育留言墙 · 测试</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', '微软雅黑', sans-serif;
      background: #f5f7f2;
      padding: 2rem;
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      color: #3a5e2b;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .subtitle {
      color: #6b7c63;
      margin-bottom: 2rem;
      font-size: 1rem;
      border-left: 4px solid #9bb88b;
      padding-left: 1rem;
    }

    .notice-box {
      background: #e8f0e3;
      border-radius: 16px;
      padding: 1.2rem 1.5rem;
      margin-bottom: 2rem;
      color: #3a5e2b;
      font-size: 0.95rem;
    }

    .notice-box ul {
      margin-top: 0.5rem;
      margin-left: 1.5rem;
    }

    .notice-box li {
      margin-bottom: 0.25rem;
    }

    .message-board {
      background: white;
      border-radius: 24px;
      padding: 1.5rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
      border: 1px solid #d9e6d3;
    }

    .board-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 2px solid #e2ecdc;
    }

    .board-header h2 {
      color: #4a6b3f;
      font-weight: 400;
      font-size: 1.3rem;
    }

    .anonymous-badge {
      background: #d9e6d3;
      padding: 0.3rem 1rem;
      border-radius: 30px;
      font-size: 0.8rem;
      color: #3a5e2b;
    }

    /* 腾讯文档嵌入区域 */
    .tencent-doc-wrapper {
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #c8dcc0;
      background: white;
    }

    iframe {
      display: block;
      width: 100%;
      height: 500px;
      border: none;
    }

    .back-link {
      margin-top: 2rem;
      text-align: center;
    }

    .back-link a {
      color: #7fa86a;
      text-decoration: none;
      font-size: 0.95rem;
    }

    .back-link a:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: 2.5rem;
      text-align: center;
      color: #9bb88b;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <h1>
    <span>📝</span> 
    <span>德育留言墙 · 测试版</span>
  </h1>
  <div class="subtitle">
    匿名留言 · 无需登录 · 文明用语
  </div>

  <!-- 使用说明 -->
  <div class="notice-box">
    <strong>🧪 测试说明：</strong>
    <ul>
      <li>下方是一个共享的腾讯文档，设置为了「所有人可编辑」</li>
      <li>你可以在里面直接打字，内容会实时保存</li>
      <li>其他打开这个网页的人也能看到并编辑</li>
      <li>⚠️ 因为是测试，请随意输入内容看效果</li>
    </ul>
  </div>

  <!-- 留言板主体 -->
  <div class="message-board">
    <div class="board-header">
      <h2>🌱 大家的心声</h2>
      <span class="anonymous-badge">🕶️ 匿名留言模式</span>
    </div>
    
    <div class="tencent-doc-wrapper">
      <!-- 这里嵌入你提供的腾讯文档链接 -->
      <iframe 
        src="https://docs.qq.com/doc/DVFBQbGJFYnZKVmhI" 
        width="100%" 
        height="500px" 
        frameborder="0"
        allowfullscreen>
      </iframe>
    </div>
    
    <p style="margin-top: 1rem; color: #8aa67d; font-size: 0.85rem; text-align: center;">
      👆 点击上方区域即可输入留言，支持换行、简单的格式调整
    </p>
  </div>

  <!-- 返回首页链接（可选） -->
  <div class="back-link">
    <a href="index.html">← 返回网站首页</a>
  </div>

  <footer>
    <p>师范课程作业 · 道德教育专题 · 留言板功能测试</p>
  </footer>

</body>
</html>
