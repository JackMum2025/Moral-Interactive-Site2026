<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>德润童心 · Menyuburkan Moral Muda</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', '微软雅黑', system-ui, sans-serif;
      background: linear-gradient(145deg, #e6f0e2 0%, #f8fbf7 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: white;
      max-width: 450px;
      width: 100%;
      padding: 2.5rem 2rem;
      border-radius: 32px;
      box-shadow: 0 12px 28px rgba(80, 110, 60, 0.12);
      border: 1px solid #c8dcc0;
      text-align: center;
    }

    .card-icon { font-size: 4rem; margin-bottom: 0.5rem; }
    h1 { color: #2d4e1e; font-size: 2rem; font-weight: 500; margin-bottom: 0.3rem; }
    .subtitle { color: #6b7c63; margin-bottom: 2rem; font-size: 1rem; }

    .lang-buttons {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .lang-btn {
      padding: 1.2rem 1.5rem;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      font-size: 1.3rem;
      font-weight: 500;
      transition: all 0.2s;
      text-decoration: none;
      display: block;
    }

    .lang-btn.cn {
      background: #7fa86a;
      color: white;
    }
    .lang-btn.cn:hover { background: #5b8c4e; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(127,168,106,0.3); }

    .lang-btn.ms {
      background: #4a6fa5;
      color: white;
    }
    .lang-btn.ms:hover { background: #3a5a8a; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(74,111,165,0.3); }

    .lang-desc {
      font-size: 0.9rem;
      opacity: 0.85;
      display: block;
      margin-top: 0.2rem;
    }

    footer {
      margin-top: 1.5rem;
      color: #9bb88b;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="card-icon">🌱</div>
  <h1>德润童心</h1>
  <p class="subtitle">Menyuburkan Moral Muda</p>
  
  <div class="lang-buttons">
    <a href="zh.html" class="lang-btn cn">
      🇨🇳 中文版
      <span class="lang-desc">Versi Bahasa Cina</span>
    </a>
    <a href="ms.html" class="lang-btn ms">
      🇲🇾 Bahasa Melayu
      <span class="lang-desc">Versi Bahasa Melayu</span>
    </a>
  </div>
  
  <footer>
    请选择语言 · Sila pilih bahasa
  </footer>
</div>

</body>
</html>
