<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Moral Interactive Platform</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial;
      background: #f5f7fa;
      text-align: center;
      margin: 0;
    }
    header {
      background: #4CAF50;
      color: white;
      padding: 20px;
      font-size: 24px;
    }
    .container {
      padding: 20px;
    }
    button {
      padding: 10px 20px;
      margin: 10px;
      border: none;
      background: #4CAF50;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #45a049;
    }
    .card {
      background: white;
      margin: 15px auto;
      padding: 15px;
      border-radius: 10px;
      width: 80%;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    input {
      padding: 10px;
      width: 60%;
    }
  </style>
</head>

<body>

<header>🌱 Moral Interactive Platform</header>

<div class="container">

<!-- 🎯 道德投票 -->
<div class="card">
  <h2>🎯 道德投票</h2>
  <p>你看到朋友作弊，你会怎么做？</p>

  <button onclick="vote('report')">举报</button>
  <button onclick="vote('ignore')">不理</button>
  <button onclick="vote('remind')">提醒</button>

  <p id="result"></p>
</div>

<!-- 💬 善意留言墙 -->
<div class="card">
  <h2>💬 善意留言墙</h2>

  <input id="msg" placeholder="写一句正能量的话..." />
  <button onclick="addMessage()">发送</button>

  <div id="wall"></div>
</div>

<!-- 🧠 换位思考 -->
<div class="card">
  <h2>🧠 换位思考模拟器</h2>

  <p>同学在课堂上一直讲话</p>

  <button onclick="showPerspective('teacher')">老师</button>
  <button onclick="showPerspective('student')">学生</button>
  <button onclick="showPerspective('class')">班级</button>

  <p id="perspective"></p>
</div>

</div>

<script>
let votes = {report:0, ignore:0, remind:0};

function vote(choice){
  votes[choice]++;
  let total = votes.report + votes.ignore + votes.remind;

  document.getElementById("result").innerHTML =
    "举报: " + Math.round(votes.report/total*100) + "% | " +
    "不理: " + Math.round(votes.ignore/total*100) + "% | " +
    "提醒: " + Math.round(votes.remind/total*100) + "%";
}

function addMessage(){
  let msg = document.getElementById("msg").value;
  if(msg === "") return;

  let div = document.createElement("div");
  div.innerText = "💛 " + msg;

  document.getElementById("wall").appendChild(div);
  document.getElementById("msg").value = "";
}

function showPerspective(role){
  let text = "";

  if(role === "teacher"){
    text = "老师：我希望大家专心，这样每个人都能学到知识。";
  }
  else if(role === "student"){
    text = "讲话的学生：我可能没有意识到自己影响别人。";
  }
  else{
    text = "班级：大家会被打扰，学习效率下降。";
  }

  document.getElementById("perspective").innerText = text;
}
</script>

</body>
</html>
